<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="ankylosaurusTitle">
  <title id="ankylosaurusTitle">Ankylosaurus</title>
  <!-- Tail with club -->
  <path d="M85 290 q-40 0 -45 -30" fill="none" stroke="#5D4037" stroke-width="24" stroke-linecap="round"/>
  <circle cx="36" cy="260" r="22" fill="#8D6E63" stroke="#3E2723" stroke-width="7"/>
  <!-- Body -->
  <ellipse cx="215" cy="270" rx="120" ry="75" fill="#795548" stroke="#3E2723" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="220" cy="292" rx="70" ry="40" fill="#EFEBE9"/>
  <!-- Legs -->
  <ellipse cx="165" cy="352" rx="24" ry="16" fill="#5D4037" stroke="#3E2723" stroke-width="6"/>
  <ellipse cx="275" cy="352" rx="24" ry="16" fill="#5D4037" stroke="#3E2723" stroke-width="6"/>
  <!-- Armor plates -->
  <g fill="#8D6E63" stroke="#3E2723" stroke-width="5" stroke-linejoin="round">
    <circle cx="165" cy="225" r="16"/>
    <circle cx="210" cy="210" r="18"/>
    <circle cx="258" cy="210" r="18"/>
    <circle cx="300" cy="225" r="16"/>
  </g>
  <!-- Head -->
  <ellipse cx="335" cy="245" rx="44" ry="32" fill="#795548" stroke="#3E2723" stroke-width="8"/>
  <!-- Eye -->
  <circle cx="345" cy="238" r="7" fill="#3E2723"/>
  <circle cx="348" cy="235" r="2.5" fill="#FFFFFF"/>
</svg>
