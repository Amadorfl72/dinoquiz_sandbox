<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="ankylosaurusTitle">
  <title id="ankylosaurusTitle">Ankylosaurus, cubierto de armadura ósea y con una maza en la cola</title>
  <!-- Tail -->
  <path d="M90 270 q-56 4 -60 -20 q40 4 62 8 z" fill="#FFB74D" stroke="#E65100" stroke-width="8" stroke-linejoin="round"/>
  <!-- Tail club -->
  <circle cx="35" cy="252" r="22" fill="#FFB74D" stroke="#E65100" stroke-width="8"/>
  <!-- Body -->
  <ellipse cx="220" cy="270" rx="120" ry="66" fill="#FFB74D" stroke="#E65100" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="220" cy="288" rx="80" ry="34" fill="#FFF8E1"/>
  <!-- Legs -->
  <ellipse cx="170" cy="335" rx="26" ry="18" fill="#FFA726" stroke="#E65100" stroke-width="6"/>
  <ellipse cx="280" cy="335" rx="26" ry="18" fill="#FFA726" stroke="#E65100" stroke-width="6"/>
  <!-- Armor plates -->
  <g fill="#FFE0B2" stroke="#E65100" stroke-width="5" stroke-linejoin="round">
    <ellipse cx="160" cy="225" rx="22" ry="14"/>
    <ellipse cx="210" cy="215" rx="22" ry="14"/>
    <ellipse cx="260" cy="220" rx="22" ry="14"/>
    <ellipse cx="300" cy="235" rx="20" ry="13"/>
  </g>
  <!-- Head -->
  <ellipse cx="340" cy="255" rx="40" ry="30" fill="#FFB74D" stroke="#E65100" stroke-width="8"/>
  <!-- Eye -->
  <circle cx="352" cy="247" r="6" fill="#E65100"/>
</svg>
