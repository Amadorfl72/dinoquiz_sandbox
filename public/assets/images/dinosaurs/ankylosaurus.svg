<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="ankylosaurusTitle">
  <title id="ankylosaurusTitle">Ankylosaurus</title>
  <!-- Tail with club -->
  <path d="M90 280 q-45 0 -55 -30" fill="none" stroke="#6D4C41" stroke-width="26" stroke-linecap="round"/>
  <circle cx="30" cy="245" r="24" fill="#4E342E" stroke="#2E1A12" stroke-width="6"/>
  <!-- Legs -->
  <ellipse cx="170" cy="345" rx="26" ry="18" fill="#4E342E" stroke="#2E1A12" stroke-width="6"/>
  <ellipse cx="270" cy="345" rx="26" ry="18" fill="#4E342E" stroke="#2E1A12" stroke-width="6"/>
  <!-- Body (armored) -->
  <ellipse cx="220" cy="255" rx="130" ry="80" fill="#8D6E63" stroke="#2E1A12" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="220" cy="278" rx="80" ry="40" fill="#FFF8E1"/>
  <!-- Armor plates -->
  <g fill="#6D4C41" stroke="#2E1A12" stroke-width="4">
    <ellipse cx="170" cy="210" rx="18" ry="12"/>
    <ellipse cx="215" cy="200" rx="18" ry="12"/>
    <ellipse cx="260" cy="205" rx="18" ry="12"/>
    <ellipse cx="300" cy="220" rx="16" ry="11"/>
  </g>
  <!-- Head -->
  <ellipse cx="330" cy="240" rx="46" ry="34" fill="#8D6E63" stroke="#2E1A12" stroke-width="7"/>
  <!-- Eye -->
  <circle cx="345" cy="230" r="8" fill="#2E1A12"/>
  <circle cx="348" cy="227" r="2.5" fill="#FFFFFF"/>
</svg>
