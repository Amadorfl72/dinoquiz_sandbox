<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="trexTitle">
  <title id="trexTitle">Tyrannosaurus Rex</title>
  <!-- Tail -->
  <path d="M70 300 q-40 -20 -30 -60" fill="none" stroke="#EF6C00" stroke-width="30" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="200" cy="270" rx="105" ry="85" fill="#FB8C00" stroke="#5D2E00" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="205" cy="290" rx="62" ry="46" fill="#FFF3E0"/>
  <!-- Legs -->
  <ellipse cx="160" cy="365" rx="26" ry="18" fill="#EF6C00" stroke="#5D2E00" stroke-width="6"/>
  <ellipse cx="250" cy="365" rx="26" ry="18" fill="#EF6C00" stroke="#5D2E00" stroke-width="6"/>
  <!-- Tiny arms -->
  <path d="M140 250 q-16 6 -18 22" fill="none" stroke="#FB8C00" stroke-width="12" stroke-linecap="round"/>
  <path d="M270 250 q16 6 18 22" fill="none" stroke="#FB8C00" stroke-width="12" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="300" cy="150" r="75" fill="#FB8C00" stroke="#5D2E00" stroke-width="8"/>
  <!-- Snout -->
  <ellipse cx="355" cy="170" rx="42" ry="26" fill="#FB8C00" stroke="#5D2E00" stroke-width="8"/>
  <!-- Teeth -->
  <path d="M330 190 l6 12 6 -12 z" fill="#FFFFFF"/>
  <path d="M348 194 l6 12 6 -12 z" fill="#FFFFFF"/>
  <!-- Eye -->
  <circle cx="310" cy="120" r="12" fill="#5D2E00"/>
  <circle cx="314" cy="116" r="4" fill="#FFFFFF"/>
</svg>
