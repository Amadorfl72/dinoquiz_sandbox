<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="trexTitle">
  <title id="trexTitle">Tyrannosaurus Rex</title>
  <!-- Tail -->
  <path d="M70 300 q-40 -10 -46 -46" fill="none" stroke="#E57373" stroke-width="34" stroke-linecap="round"/>
  <!-- Legs -->
  <ellipse cx="170" cy="345" rx="28" ry="20" fill="#C62828" stroke="#7F0000" stroke-width="6"/>
  <ellipse cx="250" cy="345" rx="28" ry="20" fill="#C62828" stroke="#7F0000" stroke-width="6"/>
  <!-- Body -->
  <ellipse cx="210" cy="250" rx="120" ry="95" fill="#E57373" stroke="#7F0000" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="210" cy="270" rx="70" ry="55" fill="#FFF3E0"/>
  <!-- Tiny arms -->
  <path d="M150 240 q-20 10 -18 30" fill="none" stroke="#E57373" stroke-width="14" stroke-linecap="round"/>
  <path d="M270 240 q20 10 18 30" fill="none" stroke="#E57373" stroke-width="14" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="300" cy="140" rx="78" ry="62" fill="#E57373" stroke="#7F0000" stroke-width="8"/>
  <!-- Jaw -->
  <path d="M240 175 q80 40 140 -5 q-10 30 -70 32 q-50 0 -70 -27 z" fill="#FFFFFF" stroke="#7F0000" stroke-width="6"/>
  <!-- Teeth -->
  <g fill="#FFFFFF" stroke="#7F0000" stroke-width="2">
    <path d="M255 178 l6 12 6 -12 z"/>
    <path d="M280 190 l6 12 6 -12 z"/>
    <path d="M305 195 l6 12 6 -12 z"/>
  </g>
  <!-- Eye -->
  <circle cx="315" cy="115" r="12" fill="#7F0000"/>
  <circle cx="319" cy="111" r="4" fill="#FFFFFF"/>
</svg>
