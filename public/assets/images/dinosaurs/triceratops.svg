<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="triceratopsTitle">
  <title id="triceratopsTitle">Triceratops, con tres cuernos y un gran escudo óseo</title>
  <!-- Body -->
  <ellipse cx="210" cy="260" rx="120" ry="82" fill="#64B5F6" stroke="#1565C0" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="210" cy="280" rx="76" ry="48" fill="#FFF8E1"/>
  <!-- Legs -->
  <ellipse cx="150" cy="345" rx="26" ry="18" fill="#42A5F5" stroke="#1565C0" stroke-width="6"/>
  <ellipse cx="260" cy="345" rx="26" ry="18" fill="#42A5F5" stroke="#1565C0" stroke-width="6"/>
  <!-- Frill -->
  <path d="M275 95 q90 -10 90 90 q-40 -20 -70 -4 z" fill="#42A5F5" stroke="#1565C0" stroke-width="8" stroke-linejoin="round"/>
  <!-- Head -->
  <ellipse cx="300" cy="175" rx="66" ry="56" fill="#64B5F6" stroke="#1565C0" stroke-width="8"/>
  <!-- Beak -->
  <path d="M355 190 q26 4 24 26 q-24 6 -30 -14 z" fill="#90CAF9" stroke="#1565C0" stroke-width="6" stroke-linejoin="round"/>
  <!-- Horns -->
  <path d="M300 122 l-10 -46 l16 40 z" fill="#FFF8E1" stroke="#1565C0" stroke-width="5" stroke-linejoin="round"/>
  <path d="M270 135 l-32 -30 l38 14 z" fill="#FFF8E1" stroke="#1565C0" stroke-width="5" stroke-linejoin="round"/>
  <path d="M330 135 l32 -30 l-38 14 z" fill="#FFF8E1" stroke="#1565C0" stroke-width="5" stroke-linejoin="round"/>
  <!-- Eye -->
  <circle cx="288" cy="168" r="9" fill="#1565C0"/>
  <circle cx="291" cy="165" r="3" fill="#FFFFFF"/>
</svg>
