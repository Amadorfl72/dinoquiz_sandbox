<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="velociraptorTitle">
  <title id="velociraptorTitle">Velociraptor</title>
  <!-- Tail -->
  <path d="M90 290 q-50 -10 -50 -70" fill="none" stroke="#AD1457" stroke-width="24" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="215" cy="255" rx="90" ry="70" fill="#D81B60" stroke="#4A0026" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="220" cy="270" rx="52" ry="38" fill="#FCE4EC"/>
  <!-- Legs -->
  <path d="M170 310 q-10 40 -20 55" fill="none" stroke="#AD1457" stroke-width="20" stroke-linecap="round"/>
  <path d="M250 310 q10 40 20 55" fill="none" stroke="#AD1457" stroke-width="20" stroke-linecap="round"/>
  <!-- Arms -->
  <path d="M150 230 q-24 8 -28 30" fill="none" stroke="#D81B60" stroke-width="12" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="310" cy="175" rx="55" ry="45" fill="#D81B60" stroke="#4A0026" stroke-width="8"/>
  <!-- Snout -->
  <path d="M350 165 l45 -8 -10 40 z" fill="#D81B60" stroke="#4A0026" stroke-width="8" stroke-linejoin="round"/>
  <!-- Eye -->
  <circle cx="315" cy="160" r="9" fill="#4A0026"/>
  <circle cx="318" cy="157" r="3" fill="#FFFFFF"/>
  <!-- Head crest -->
  <path d="M280 140 q10 -26 30 -20" fill="none" stroke="#4A0026" stroke-width="6" stroke-linecap="round"/>
</svg>
