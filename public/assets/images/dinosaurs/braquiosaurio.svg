<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="braquiosaurioTitle">
  <title id="braquiosaurioTitle">Braquiosaurio</title>
  <!-- Tail -->
  <path d="M100 300 q-50 0 -60 -40" fill="none" stroke="#42A5F5" stroke-width="26" stroke-linecap="round"/>
  <!-- Legs -->
  <ellipse cx="170" cy="350" rx="24" ry="18" fill="#1565C0" stroke="#0D3C78" stroke-width="6"/>
  <ellipse cx="240" cy="352" rx="26" ry="20" fill="#1565C0" stroke="#0D3C78" stroke-width="6"/>
  <!-- Body -->
  <ellipse cx="200" cy="270" rx="110" ry="70" fill="#42A5F5" stroke="#0D3C78" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="200" cy="288" rx="65" ry="38" fill="#FFF8E1"/>
  <!-- Long neck -->
  <path d="M260 230 q40 -110 60 -160" fill="none" stroke="#42A5F5" stroke-width="46" stroke-linecap="round"/>
  <path d="M260 230 q40 -110 60 -160" fill="none" stroke="#0D3C78" stroke-width="46" stroke-linecap="round" opacity="0" />
  <!-- Head -->
  <ellipse cx="325" cy="65" rx="34" ry="26" fill="#42A5F5" stroke="#0D3C78" stroke-width="7"/>
  <!-- Eye -->
  <circle cx="336" cy="58" r="7" fill="#0D3C78"/>
  <circle cx="339" cy="55" r="2.5" fill="#FFFFFF"/>
  <!-- Smile -->
  <path d="M310 78 q15 8 30 2" fill="none" stroke="#0D3C78" stroke-width="4" stroke-linecap="round"/>
</svg>
