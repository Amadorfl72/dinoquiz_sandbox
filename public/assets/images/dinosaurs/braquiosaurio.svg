<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="braquiosaurioTitle">
  <title id="braquiosaurioTitle">Braquiosaurio, con un cuello muy largo para comer hojas altas</title>
  <!-- Tail -->
  <path d="M100 300 q-50 6 -56 -34 q40 14 60 18 z" fill="#AED581" stroke="#33691E" stroke-width="8" stroke-linejoin="round"/>
  <!-- Body -->
  <ellipse cx="200" cy="280" rx="100" ry="66" fill="#AED581" stroke="#33691E" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="200" cy="296" rx="64" ry="36" fill="#FFF8E1"/>
  <!-- Legs -->
  <ellipse cx="150" cy="352" rx="24" ry="18" fill="#9CCC65" stroke="#33691E" stroke-width="6"/>
  <ellipse cx="250" cy="352" rx="24" ry="18" fill="#9CCC65" stroke="#33691E" stroke-width="6"/>
  <!-- Long neck -->
  <path d="M260 240 q40 -110 60 -160" fill="none" stroke="#AED581" stroke-width="46" stroke-linecap="round"/>
  <!-- Neck outline -->
  <path d="M238 250 q40 -114 62 -168 M282 232 q42 -108 60 -156" fill="none" stroke="#33691E" stroke-width="6" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="330" cy="65" rx="30" ry="22" fill="#AED581" stroke="#33691E" stroke-width="8"/>
  <!-- Eye -->
  <circle cx="340" cy="60" r="6" fill="#33691E"/>
</svg>
