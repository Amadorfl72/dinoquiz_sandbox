<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="estegosaurioTitle">
  <title id="estegosaurioTitle">Estegosaurio</title>
  <!-- Tail with spikes -->
  <path d="M90 290 q-40 -5 -50 -40" fill="none" stroke="#558B2F" stroke-width="26" stroke-linecap="round"/>
  <g fill="#FFF8E1" stroke="#33691E" stroke-width="4">
    <path d="M42 245 l-22 -12 26 -8 z"/>
    <path d="M35 220 l-24 -6 22 -14 z"/>
  </g>
  <!-- Legs -->
  <ellipse cx="150" cy="345" rx="24" ry="18" fill="#33691E" stroke="#1B3409" stroke-width="6"/>
  <ellipse cx="280" cy="340" rx="26" ry="20" fill="#33691E" stroke="#1B3409" stroke-width="6"/>
  <!-- Body -->
  <ellipse cx="215" cy="255" rx="130" ry="75" fill="#7CB342" stroke="#33691E" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="215" cy="275" rx="80" ry="42" fill="#FFF8E1"/>
  <!-- Back plates -->
  <g fill="#FBC02D" stroke="#33691E" stroke-width="5" stroke-linejoin="round">
    <path d="M130 190 l20 -40 20 40 z"/>
    <path d="M175 178 l22 -46 22 46 z"/>
    <path d="M222 178 l22 -46 22 46 z"/>
    <path d="M269 190 l20 -40 20 40 z"/>
  </g>
  <!-- Head -->
  <ellipse cx="320" cy="235" rx="48" ry="32" fill="#7CB342" stroke="#33691E" stroke-width="7"/>
  <!-- Eye -->
  <circle cx="335" cy="222" r="8" fill="#33691E"/>
  <circle cx="338" cy="219" r="2.5" fill="#FFFFFF"/>
</svg>
