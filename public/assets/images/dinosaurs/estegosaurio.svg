<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="estegosaurioTitle">
  <title id="estegosaurioTitle">Estegosaurio</title>
  <!-- Tail with spikes -->
  <path d="M90 300 q-40 -10 -40 -50" fill="none" stroke="#00838F" stroke-width="22" stroke-linecap="round"/>
  <path d="M45 250 l-16 -24 20 4 z" fill="#B2EBF2" stroke="#003940" stroke-width="4"/>
  <path d="M55 275 l-20 -16 22 -4 z" fill="#B2EBF2" stroke="#003940" stroke-width="4"/>
  <!-- Body -->
  <ellipse cx="215" cy="270" rx="115" ry="75" fill="#00ACC1" stroke="#003940" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="220" cy="290" rx="66" ry="42" fill="#E0F7FA"/>
  <!-- Legs -->
  <ellipse cx="160" cy="355" rx="24" ry="16" fill="#00838F" stroke="#003940" stroke-width="6"/>
  <ellipse cx="270" cy="355" rx="24" ry="16" fill="#00838F" stroke="#003940" stroke-width="6"/>
  <!-- Back plates -->
  <g fill="#B2EBF2" stroke="#003940" stroke-width="6" stroke-linejoin="round">
    <path d="M130 210 l20 -40 20 40 z"/>
    <path d="M175 195 l22 -46 22 46 z"/>
    <path d="M225 195 l22 -46 22 46 z"/>
    <path d="M275 210 l20 -40 20 40 z"/>
  </g>
  <!-- Head -->
  <ellipse cx="330" cy="230" rx="42" ry="30" fill="#00ACC1" stroke="#003940" stroke-width="8"/>
  <!-- Eye -->
  <circle cx="340" cy="222" r="7" fill="#003940"/>
  <circle cx="343" cy="219" r="2.5" fill="#FFFFFF"/>
</svg>
