<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="estegosaurioTitle">
  <title id="estegosaurioTitle">Estegosaurio, con placas óseas en el lomo y púas en la cola</title>
  <!-- Tail -->
  <path d="M90 280 q-46 4 -56 -30 l20 -8 q30 20 40 24 z" fill="#BA68C8" stroke="#6A1B9A" stroke-width="8" stroke-linejoin="round"/>
  <!-- Tail spikes -->
  <path d="M40 250 l-20 -14 l4 24 z M38 270 l-22 -4 l10 22 z" fill="#FFF8E1" stroke="#6A1B9A" stroke-width="5" stroke-linejoin="round"/>
  <!-- Body -->
  <ellipse cx="210" cy="260" rx="110" ry="70" fill="#BA68C8" stroke="#6A1B9A" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="210" cy="278" rx="70" ry="40" fill="#FFF8E1"/>
  <!-- Legs -->
  <ellipse cx="160" cy="335" rx="24" ry="18" fill="#AB47BC" stroke="#6A1B9A" stroke-width="6"/>
  <ellipse cx="260" cy="335" rx="24" ry="18" fill="#AB47BC" stroke="#6A1B9A" stroke-width="6"/>
  <!-- Back plates -->
  <g fill="#F8BBD0" stroke="#6A1B9A" stroke-width="6" stroke-linejoin="round">
    <path d="M140 205 l18 -40 18 40 z"/>
    <path d="M180 195 l20 -46 20 46 z"/>
    <path d="M225 195 l20 -46 20 46 z"/>
    <path d="M270 205 l18 -40 18 40 z"/>
  </g>
  <!-- Head -->
  <ellipse cx="325" cy="225" rx="40" ry="30" fill="#BA68C8" stroke="#6A1B9A" stroke-width="8"/>
  <!-- Eye -->
  <circle cx="335" cy="216" r="6" fill="#6A1B9A"/>
</svg>
