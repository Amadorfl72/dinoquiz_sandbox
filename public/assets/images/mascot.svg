<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="mascotTitle">
  <title id="mascotTitle">Dino, la mascota de DinoQuiz</title>
  <!-- Body -->
  <ellipse cx="200" cy="250" rx="120" ry="100" fill="#66BB6A" stroke="#1B5E20" stroke-width="8"/>
  <!-- Belly -->
  <ellipse cx="200" cy="270" rx="72" ry="58" fill="#FFF8E1"/>
  <!-- Head -->
  <circle cx="290" cy="150" r="70" fill="#66BB6A" stroke="#1B5E20" stroke-width="8"/>
  <!-- Snout -->
  <ellipse cx="335" cy="170" rx="34" ry="24" fill="#66BB6A" stroke="#1B5E20" stroke-width="8"/>
  <!-- Eye -->
  <circle cx="305" cy="125" r="11" fill="#1B5E20"/>
  <circle cx="309" cy="121" r="3.5" fill="#FFFFFF"/>
  <!-- Smile -->
  <path d="M300 165 q25 20 55 4" fill="none" stroke="#1B5E20" stroke-width="6" stroke-linecap="round"/>
  <!-- Back plates -->
  <g fill="#FBC02D" stroke="#1B5E20" stroke-width="6" stroke-linejoin="round">
    <path d="M150 100 l22 -34 22 34 z"/>
    <path d="M198 92 l24 -38 24 38 z"/>
    <path d="M248 100 l22 -34 22 34 z"/>
  </g>
  <!-- Legs -->
  <ellipse cx="150" cy="345" rx="26" ry="18" fill="#4C9A50" stroke="#1B5E20" stroke-width="6"/>
  <ellipse cx="250" cy="345" rx="26" ry="18" fill="#4C9A50" stroke="#1B5E20" stroke-width="6"/>
  <!-- Waving arm -->
  <path d="M95 230 q-40 -10 -46 -46" fill="none" stroke="#66BB6A" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tail -->
  <path d="M310 300 q60 10 66 -34" fill="none" stroke="#66BB6A" stroke-width="34" stroke-linecap="round"/>
</svg>
