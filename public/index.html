<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DinoQuiz</title>
  <meta name="description" content="DinoQuiz: aprende sobre dinosaurios jugando, 100% offline y sin registro." />
  <meta name="theme-color" content="#2E7D32" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <div id="app-shell">
    <header class="app-shell__controls">
      <div id="mute-toggle"></div>
    </header>
    <div id="app" role="main">
      <!-- App shell: las pantallas (Inicio, Quiz, Resultados) se montan aquí. -->
    </div>
  </div>

  <!--
    No bundler: every module the browser runs is a plain <script>. `defer`
    keeps them in order and runs them after the document parses. The game
    logic and screens register themselves on window.DinoQuiz; main.js (last)
    fetches the data and drives the Inicio -> Quiz -> Resultados loop.
  -->
  <script src="/scripts/scoring.js" defer></script>
  <script src="/scripts/soundService.js" defer></script>
  <script src="/scripts/adsService.js" defer></script>
  <script src="/scripts/gameFlow.js" defer></script>
  <script src="/scripts/audio.js" defer></script>
  <script src="/scripts/network.js" defer></script>
  <script src="/scripts/appShell.js" defer></script>
  <script src="/scripts/homeScreen.js" defer></script>
  <script src="/scripts/privacyPolicyScreen.js" defer></script>
  <script src="/scripts/questionScreen.js" defer></script>
  <script src="/scripts/resultsScreen.js" defer></script>
  <script src="/scripts/main.js" defer></script>
</body>
</html>
