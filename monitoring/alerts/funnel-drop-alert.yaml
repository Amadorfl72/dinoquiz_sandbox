alert: FunnelDropRateHigh
for: 1h
expr: (sum(rate(app_open_total[1h])) - sum(rate(partida_iniciada_total[1h]))) / sum(rate(app_open_total[1h])) > 0.5
labels:
  severity: warning
annotations:
  summary: "High drop rate in DinoQuiz funnel"
  description: "The drop rate in the DinoQuiz funnel (App Open -> Partida Iniciada) has exceeded 50% in the last hour."