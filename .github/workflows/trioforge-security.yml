# Managed by TrioForge — deterministic security gate.
# Policy: {'secrets': 'block', 'deps': 'block', 'sast': 'block', 'iac': 'warn', 'lint': 'off'}. Edit via TrioForge re-provisioning rather than by hand.
name: trioforge-security
on:
  pull_request:
permissions:
  contents: read
jobs:
  trioforge-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'
      - name: Secret scan (gitleaks)
        run: |
          base=https://github.com/gitleaks/gitleaks/releases/download
          curl -sSfL "$base/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz" | tar -xz gitleaks
          if ! ./gitleaks detect --source . --redact --no-banner; then
            echo "::error::trioforge-security: gitleaks detected committed secrets"
            exit 1
          fi
      - name: Dependency scan (osv-scanner)
        run: |
          base=https://github.com/google/osv-scanner/releases/download
          curl -sSfL "$base/v1.9.2/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          set +e; ./osv-scanner --recursive ./ ; code=$?; set -e
          if [ "$code" = "1" ]; then
            echo "::error::trioforge-security: osv-scanner found vulnerable dependencies"
            exit 1
          fi
      - name: SAST (semgrep)
        run: |
          pip install --quiet semgrep
          set +e; semgrep --config auto --error --quiet --exclude .github . ; code=$?; set -e
          if [ "$code" != "0" ]; then
            echo "::error::trioforge-security: semgrep found SAST issues"
            exit 1
          fi
      - name: IaC scan (checkov)
        run: |
          pip install --quiet checkov
          set +e; checkov -d . --skip-path .github --quiet --compact ; code=$?; set -e
          if [ "$code" != "0" ]; then
            echo "::error::trioforge-security: checkov found IaC misconfigurations"
            true
          fi
