# Managed by TrioForge — deterministic security gate (secrets + dependencies).
# Edit via TrioForge re-provisioning rather than by hand.
name: trioforge-security
on:
  pull_request:
permissions:
  contents: read
jobs:
  trioforge-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        run: |
          base=https://github.com/gitleaks/gitleaks/releases/download
          curl -sSfL "$base/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner -v
      - name: Dependency scan (osv-scanner)
        run: |
          base=https://github.com/google/osv-scanner/releases/download
          curl -sSfL "$base/v1.9.2/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --recursive ./ ; code=$?
          # 0=clean, 1=vulnerabilities (block), 128=no packages found (clean).
          if [ "$code" = "1" ]; then exit 1; fi
          exit 0
